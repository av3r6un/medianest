services:
  alloha-backend:
    image: av3rgun/medianest:latest
    pull_policy: always
    container_name: alloha-backend
    ports:
      - "8090:8090"
    environment:
      DB_URL: mysql+aiomysql://alloha:change-me@db:3306/alloha
      SECRET_KEY: change-this-secret
    volumes:
      - ./backend/config/settings.yaml:/app/backend/config/settings.yaml:ro
      - ./var/work:/app/var/work
      - ./var/plex:/app/var/plex
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=3).read()\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
